    <style>
        /* --- Modern Design System Variables --- */
        :root {
            --bg-dark: #090d16;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            --pdf-gradient: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- Main Layout Wrapper --- */
        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* --- Premium Input Form Glassmorphism --- */
        .form-container { 
            background: var(--panel-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%;
            margin-bottom: 35px;
            position: relative;
        }

        h2 {
            margin-bottom: 25px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-group { 
            margin-bottom: 20px; 
            position: relative;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px; 
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #1e293b; 
            background: rgba(15, 23, 42, 0.6);
            color: white;
            border-radius: 12px; 
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        /* File Upload Input Custom styling */
        .form-group input[type="file"] {
            padding: 10px;
            font-size: 13px;
            color: #94a3b8;
            cursor: pointer;
        }
        .form-group input[type="file"]::-webkit-file-upload-button {
            background: #1e293b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            margin-right: 10px;
            cursor: pointer;
        }

        .gen-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent-gradient); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }
        
        .gen-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        /* --- High-End Tech ID Card Styling --- */
        .id-card { 
            background: linear-gradient(145deg, #0f172a 0%, #030712 100%); 
            color: white; 
            width: 100%;
            height: 240px; 
            border-radius: 24px; 
            padding: 28px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            
            /* Pop-up entry animation */
            animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        } 

        @keyframes cardPop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .id-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-gradient);
        }
        
        .card-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #64748b;
        }

        .chip-mesh {
            width: 32px;
            height: 24px;
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            border-radius: 6px;
            opacity: 0.8;
            position: relative;
        }

        .chip-mesh::before {
            content: '';
            position: absolute;
            top: 4px; left: 6px; right: 6px; bottom: 4px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 2px;
        }

        .card-main-content {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: auto;
            margin-bottom: auto;
        }

        .avatar-container {
            width: 85px;
            height: 85px;
            border-radius: 20px; 
            overflow: hidden;
            border: 2px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            flex-shrink: 0;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #card-name {
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #card-role {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 13px; 
            margin-bottom: 10px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-info {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-footer {
            font-size: 10px;
            color: #475569;
            text-align: right;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* --- Premium Dual Buttons Group --- */
        .action-buttons {
            width: 100%;
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .download-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-png {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }
        .btn-png:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-pdf {
            background: var(--pdf-gradient);
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);
        }
        .btn-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.5);
            filter: brightness(1.1);
        }
        
        .hidden { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <div class="app-container">

            <div class="card-main-content">

                </div>
                
                <div class="card-details">

        <div id="action-buttons" class="action-buttons hidden">
